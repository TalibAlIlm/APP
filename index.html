<html lang="en">
<head>
<meta charset="UTF-8">

<title>Talib Al-Ilm — Islamic Sciences Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07080f;--surface:#0d0e1a;--border:rgba(255,255,255,0.06);
  --gold:#c9a84c;--cream:#ddd6cc;--dim:#4a4840;--muted:#7a7468;
  --arabic:#4fc3f7;--quran:#69c98d;--aqeedah:#ffb74d;
  --fiqh:#e57373;--adhkar:#a5d6a7;--history:#90caf9;
  --hanbali:#ce93d8;--shafii:#4dd0e1;--maliki:#ffd54f;--hanafi:#ff8a65;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'IBM Plex Sans',sans-serif}

/* ── BACKGROUND GRID ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(201,168,76,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,0.025) 1px,transparent 1px);
  background-size:48px 48px;
}

/* ── HEADER ── */
#hdr{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(7,8,15,0.95);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-gem{
  width:28px;height:28px;flex-shrink:0;
  background:conic-gradient(from 0deg,#8b6914,#c9a84c,#e8c96d,#c9a84c,#8b6914);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  filter:drop-shadow(0 0 8px rgba(201,168,76,0.4));
}
.hdr-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:3px}
.hdr-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.hdr-sep{width:1px;height:24px;background:var(--border)}
.hdr-legend{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.3px}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.b{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;font-weight:500;letter-spacing:0.5px;font-family:'IBM Plex Mono',monospace}
.b-c{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.25)}
.b-m{background:rgba(105,201,141,0.12);color:#69c98d;border:1px solid rgba(105,201,141,0.25)}
.b-e{background:rgba(206,147,216,0.12);color:#ce93d8;border:1px solid rgba(206,147,216,0.25)}

.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-count{text-align:right}
.hdr-count-n{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);line-height:1}
.hdr-count-l{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1.5px}

/* ── SEARCH ── */
#sbar{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:99;
  display:flex;align-items:center;gap:7px;
  background:rgba(13,14,26,0.96);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  transition:border-color 0.2s;
}
#sbar:focus-within{border-color:rgba(201,168,76,0.3)}
#sbar-icon{opacity:0.35;flex-shrink:0;color:var(--gold)}
#srch{
  background:none;border:none;outline:none;
  color:var(--cream);font-family:'IBM Plex Mono',monospace;
  font-size:11px;width:180px;letter-spacing:0.3px;
}
#srch::placeholder{color:var(--dim)}
#srch-clr{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;display:none;padding:0 2px}
#srch-clr:hover{color:var(--cream)}

/* ── CONTROLS ── */
#ctrl{position:fixed;bottom:20px;left:20px;z-index:99;display:flex;flex-direction:column;gap:6px}
.cbtn{
  padding:6px 12px;background:rgba(13,14,26,0.9);
  border:1px solid var(--border);color:var(--muted);
  border-radius:4px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.3px;
  transition:all 0.15s;
}
.cbtn:hover{border-color:rgba(201,168,76,0.3);color:var(--cream);background:rgba(20,22,40,0.95)}

/* ── HINT ── */
#hint{position:fixed;bottom:20px;right:20px;z-index:99;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-align:right;line-height:2;letter-spacing:0.3px}

/* ── TOOLTIP ── */
#tip{
  position:fixed;z-index:200;pointer-events:none;
  background:rgba(10,11,20,0.97);border:1px solid rgba(201,168,76,0.18);
  border-radius:8px;padding:12px 14px;max-width:280px;
  opacity:0;transition:opacity 0.15s;
  box-shadow:0 8px 30px rgba(0,0,0,0.6);
}
#tip.on{opacity:1}
.tip-name{font-size:12px;font-weight:600;color:var(--cream);line-height:1.4;margin-bottom:4px}
.tip-auth{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);margin-bottom:6px;font-style:italic}
.tip-note{font-size:10px;color:#7a7060;line-height:1.6;margin-bottom:6px}
.tip-tags{display:flex;gap:4px;flex-wrap:wrap}

/* ── SVG ── */
#main-svg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#main-svg *{transition:opacity 0.3s ease}

/* Node styles via SVG classes */
.n-circle{cursor:pointer}
.n-text{cursor:pointer;font-family:'IBM Plex Sans',sans-serif}
.n-hit{fill:transparent;cursor:pointer}
</style>
</head>

// PREPARE DATA — assign IDs, parents, colors, expanded
// ═══════════════════════════════════════════════════════
let _uid = 0;
const allNodes = [];
const byId = {};

function prep(node, parent, depth) {
  node.id = `nd${_uid++}`;
  node.parent = parent;
  node.depth = depth;
  node.expanded = depth === 0; // only root starts expanded
  // inherit color
  node.color = node.col || (parent ? parent.color : '#888');
  // normalize children
  if(node.kids) { node.children = node.kids; delete node.kids; }
  allNodes.push(node);
  byId[node.id] = node;
  if(node.children) node.children.forEach(c => prep(c, node, depth+1));
}
prep(RAW, null, 0);

// ═══════════════════════════════════════════════════════
// LAYOUT ENGINE
// ═══════════════════════════════════════════════════════
const LW = 230; // level width (horizontal spacing)
const RH = 22;  // row height (per leaf)

function countLeaves(node) {
  if(!node.children || !node.expanded) return 1;
  return node.children.reduce((s, c) => s + countLeaves(c), 0);
}

function buildLayout(node, x, yStart, out) {
  node._x = x;
  if(!node.children || !node.expanded) {
    node._y = yStart + RH/2;
    out[node.id] = {x: node._x, y: node._y};
    return yStart + RH;
  }
  let y = yStart;
  for(const child of node.children) {
    y = buildLayout(child, x + LW, y, out);
  }
  // center parent between first and last child
  const fc = node.children[0], lc = node.children[node.children.length-1];
  node._y = (fc._y + lc._y) / 2;
  out[node.id] = {x: node._x, y: node._y};
  return y;
}

function getLayout() {
  const out = {};
  buildLayout(RAW, 80, 0, out);
  return out;
}

// SVG DOM CREATION
// ═══════════════════════════════════════════════════════
const SVG_NS = 'http://www.w3.org/2000/svg';
const svgEl = document.getElementById('main-svg');
const viewport = document.getElementById('viewport');
const linksLayer = document.getElementById('links-layer');
const nodesLayer = document.getElementById('nodes-layer');

const nodeEls = {}; // id → SVG <g>
const linkEls = {}; // parentId-childId → SVG <path>

function nodeRadius(node) {
  if(node.type === 'root') return 9;
  if(node.type === 'discipline') return 6.5;
  if(node.type === 'branch') return 5;
  if(node.type === 'sub' || node.type === 'sub-expert') return 4;
  return 3.5; // book
}

function nodeFontSize(node) {
  if(node.type === 'root') return 14;
  if(node.type === 'discipline') return 12;
  if(node.type === 'branch') return 11;
  if(node.type === 'sub' || node.type === 'sub-expert') return 10;
  return 10; // book
}

function nodeFontWeight(node) {
  if(node.type === 'root') return 700;
  if(node.type === 'discipline') return 700;
  if(node.type === 'branch') return 600;
  return 400;
}

function nodeTextColor(node) {
  if(node.type === 'root') return '#c9a84c';
  if(node.type === 'discipline') return node.color;
  if(node.type === 'book' && node.e) return '#ce93d8';
  if(node.type === 'book' && node.c) return '#c9a84c';
  if(node.type === 'sub-expert') return '#9e7ab5';
  return '#d0c8be';
}

function createAllElements() {
  // Create links first (behind nodes)
  for(const node of allNodes) {
    if(node.parent) {
      const path = document.createElementNS(SVG_NS, 'path');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', node.color);
      path.setAttribute('stroke-width', node.type === 'book' ? '0.7' : '1');
      path.setAttribute('opacity', '0');
      path.style.transition = 'opacity 0.3s ease';
      linksLayer.appendChild(path);
      linkEls[`${node.parent.id}-${node.id}`] = path;
    }
  }

  // Create nodes
  for(const node of allNodes) {
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('id', `svg-node-${node.id}`);
    g.setAttribute('opacity', '0');
    g.style.transition = 'opacity 0.3s ease';

    // Invisible hit area (bigger)
    const hit = document.createElementNS(SVG_NS, 'circle');
    hit.setAttribute('r', 15); // Larger circular hit area for better click detection
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('class', 'n-hit');
    g.appendChild(hit);

    // Circle
    const r = nodeRadius(node);
    const circ = document.createElementNS(SVG_NS, 'circle');
    circ.setAttribute('r', r);
    circ.setAttribute('class', 'n-circle');

    // Fill logic
    const hasKids = !!(node.children && node.children.length > 0);
    if(node.c) {
      circ.setAttribute('fill', '#c9a84c');
      circ.setAttribute('stroke', '#c9a84c');
    } else if(node.type === 'book') {
      circ.setAttribute('fill', 'transparent');
      circ.setAttribute('stroke', node.color);
    } else {
      circ.setAttribute('fill', node.color);
      circ.setAttribute('stroke', node.color);
    }
    circ.setAttribute('stroke-width', node.c ? '0' : '1.5');
    g.appendChild(circ);

    // Toggle ring (shows when expanded)
    if(hasKids) {
      const ring = document.createElementNS(SVG_NS, 'circle');
      ring.setAttribute('r', r + 2.5);
      ring.setAttribute('fill', 'transparent');
      ring.setAttribute('stroke', node.color);
      ring.setAttribute('stroke-width', '0.8');
      ring.setAttribute('opacity', '0.4');
      ring.setAttribute('class', 'n-ring');
      g.insertBefore(ring, circ);
    }

    // Label
    const label = document.createElementNS(SVG_NS, 'text');
    label.setAttribute('x', r + 7);
    label.setAttribute('y', '0.35em');
    label.setAttribute('font-family', "'IBM Plex Sans', sans-serif");
    label.setAttribute('font-size', nodeFontSize(node));
    label.setAttribute('font-weight', nodeFontWeight(node));
    label.setAttribute('fill', nodeTextColor(node));
    label.setAttribute('class', 'n-text');
    label.setAttribute('letter-spacing', '0.2');

    // Truncate name
    const maxLen = node.type === 'book' ? 36 : (node.type === 'discipline' ? 22 : 28);
    let txt = node.n.length > maxLen ? node.n.slice(0, maxLen) + '…' : node.n;
    label.textContent = txt;
    g.appendChild(label);

    // Badges row
    if(node.c || node.m || node.e) {
      let bx = r + 7 + (txt.length * nodeFontSize(node) * 0.48) + 6;
      if(node.c) {
        const bt = document.createElementNS(SVG_NS, 'text');
        bt.setAttribute('x', bx);
        bt.setAttribute('y', '0.35em');
        bt.setAttribute('font-family', "'IBM Plex Mono', monospace");
        bt.setAttribute('font-size', '7.5');
        bt.setAttribute('font-weight', '500');
        bt.setAttribute('fill', '#c9a84c');
        bt.setAttribute('opacity', '0.9');
        bt.textContent = '[C]';
        g.appendChild(bt);
        bx += 18;
      }
      if(node.m) {
        const bt = document.createElementNS(SVG_NS, 'text');
        bt.setAttribute('x', bx);
        bt.setAttribute('y', '0.35em');
        bt.setAttribute('font-family', "'IBM Plex Mono', monospace");
        bt.setAttribute('font-size', '7.5');
        bt.setAttribute('font-weight', '500');
        bt.setAttribute('fill', '#69c98d');
        bt.setAttribute('opacity', '0.9');
        bt.textContent = '[M]';
        g.appendChild(bt);
        bx += 18;
      }
      if(node.e) {
        const bt = document.createElementNS(SVG_NS, 'text');
        bt.setAttribute('x', bx);
        bt.setAttribute('y', '0.35em');
        bt.setAttribute('font-family', "'IBM Plex Mono', monospace");
        bt.setAttribute('font-size', '7.5');
        bt.setAttribute('font-weight', '500');
        bt.setAttribute('fill', '#ce93d8');
        bt.setAttribute('opacity', '0.8');
        bt.textContent = '[★]';
        g.appendChild(bt);
      }
    }

    // Expand indicator (small chevron)
    if(hasKids) {
      const chev = document.createElementNS(SVG_NS, 'text');
      chev.setAttribute('x', -r - 5);
      chev.setAttribute('y', '0.35em');
      chev.setAttribute('font-size', '8');
      chev.setAttribute('font-family', "'IBM Plex Mono', monospace");
      chev.setAttribute('fill', node.color);
      chev.setAttribute('opacity', '0.5');
      chev.setAttribute('text-anchor', 'middle');
      chev.setAttribute('class', 'n-chev');
      chev.textContent = '▶';
      g.appendChild(chev);
    }

    // Events
    if(hasKids) {
      g.style.cursor = 'pointer';
      g.addEventListener('click', (e) => { e.stopPropagation(); handleToggle(node.id); });
      g.addEventListener('mouseenter', () => highlightBranch(node.id, true));
      g.addEventListener('mouseleave', () => highlightBranch(node.id, false));
    } else {
      g.addEventListener('mouseenter', (e) => showTip(e, node));
      g.addEventListener('mouseleave', hideTip);
    }

    nodesLayer.appendChild(g);
    nodeEls[node.id] = g;
  }
}

// ═══════════════════════════════════════════════════════
// RENDER — position all elements based on layout
// ═══════════════════════════════════════════════════════
function renderFrame(lyt) {
  for(const node of allNodes) {
    const el = nodeEls[node.id];
    if(!el) continue;
    const pos = lyt[node.id];
    if(pos) {
      el.setAttribute('transform', `translate(${pos.x},${pos.y})`);
      el.setAttribute('opacity', '1');
      // Update chevron direction
      const chev = el.querySelector('.n-chev');
      if(chev) {
        chev.setAttribute('transform', node.expanded ? 'rotate(90,0,0)' : '');
      }
    } else {
      el.setAttribute('opacity', '0');
    }
  }

  // Draw links
  for(const node of allNodes) {
    if(!node.parent) continue;
    const key = `${node.parent.id}-${node.id}`;
    const el = linkEls[key];
    if(!el) continue;
    const src = lyt[node.parent.id];
    const tgt = lyt[node.id];
    if(src && tgt) {
      const cpx = src.x + (tgt.x - src.x) / 2;
      el.setAttribute('d', `M${src.x},${src.y} C${cpx},${src.y} ${cpx},${tgt.y} ${tgt.x},${tgt.y}`);
      el.setAttribute('opacity', node.type === 'book' ? '0.25' :
                                  node.type === 'sub' || node.type === 'sub-expert' ? '0.3' : '0.4');
    } else {
      el.setAttribute('opacity', '0');
    }
  }
}

// ═══════════════════════════════════════════════════════
// ANIMATION SYSTEM
// ═══════════════════════════════════════════════════════
let currentLayout = {};
let animId = null;

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function animate(fromLyt, toLyt, duration) {
  if(animId) cancelAnimationFrame(animId);
  const start = performance.now();
  const allIds = new Set([...Object.keys(fromLyt), ...Object.keys(toLyt)]);

  function frame(now) {
    const raw = Math.min((now - start) / duration, 1);
    const t = easeInOutCubic(raw);
    const cur = {};

    for(const id of allIds) {
      const f = fromLyt[id];
      const to = toLyt[id];
      const node = byId[id];
      if(!node) continue;

      if(f && to) {
        // Existing node: interpolate
        cur[id] = { x: lerp(f.x, to.x, t), y: lerp(f.y, to.y, t) };
        const el = nodeEls[id];
        if(el) el.setAttribute('opacity', '1');
      } else if(!f && to) {
        // New node: appear from parent position
        const pp = node.parent ? (fromLyt[node.parent.id] || to) : to;
        cur[id] = { x: lerp(pp.x, to.x, t), y: lerp(pp.y, to.y, t) };
        const el = nodeEls[id];
        if(el) el.setAttribute('opacity', String(t));
      } else if(f && !to) {
        // Removed node: collapse to parent position
        const pp = node.parent ? (toLyt[node.parent.id] || f) : f;
        cur[id] = { x: lerp(f.x, pp.x, t), y: lerp(f.y, pp.y, t) };
        const el = nodeEls[id];
        if(el) el.setAttribute('opacity', String(1 - t));
      }
    }

    renderFrame(cur);

    if(raw < 1) {
      animId = requestAnimationFrame(frame);
    } else {
      renderFrame(toLyt);
      // Final opacity cleanup
      for(const id of allIds) {
        if(!toLyt[id]) {
          const el = nodeEls[id];
          if(el) el.setAttribute('opacity', '0');
        }
      }
      currentLayout = toLyt;
      animId = null;
    }
  }

  animId = requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════════════
// TOGGLE
// ═══════════════════════════════════════════════════════
function handleToggle(id) {
  const node = byId[id];
  if(!node || !node.children) return;
  const prev = Object.assign({}, currentLayout);
  node.expanded = !node.expanded;
  const next = getLayout();
  animate(prev, next, 480);
}

// ═══════════════════════════════════════════════════════
// BRANCH HIGHLIGHT
// ═══════════════════════════════════════════════════════
function highlightBranch(id, on) {
  const node = byId[id];
  if(!node) return;
  function walk(n) {
    const el = nodeEls[n.id];
    if(!el) return;
    const circ = el.querySelector('.n-circle');
    if(circ) {
      if(on) {
        circ.style.filter = `drop-shadow(0 0 5px ${n.color})`;
      } else {
        circ.style.filter = '';
      }
    }
    if(n.expanded && n.children) n.children.forEach(walk);
  }
  walk(node);
}

// ═══════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════
const tipEl = document.getElementById('tip');
function showTip(e, node) {
  let html = `<div class="tip-name">${node.n}</div>`;
  if(node.a) html += `<div class="tip-auth">— ${node.a}</div>`;
  if(node.nt) html += `<div class="tip-note">${node.nt}</div>`;
  html += '<div class="tip-tags">';
  if(node.c) html += '<span class="b b-c">CORE BOOK</span>';
  if(node.m) html += '<span class="b b-m">MEMORIZE</span>';
  if(node.e) html += '<span class="b b-e">★ EXPERT</span>';
  if(!node.c && !node.m && !node.e) html += '<span style="font-size:9px;color:#4a4840;font-family:\'IBM Plex Mono\',monospace">STANDARD</span>';
  html += '</div>';
  tipEl.innerHTML = html;
  tipEl.classList.add('on');
  moveTip(e);
}
function moveTip(e) {
  const x = Math.min(e.clientX + 16, window.innerWidth - 300);
  const y = Math.min(e.clientY - 10, window.innerHeight - 180);
  tipEl.style.left = x + 'px';
  tipEl.style.top = y + 'px';
}
function hideTip() { tipEl.classList.remove('on'); }
document.addEventListener('mousemove', (e) => { if(tipEl.classList.contains('on')) moveTip(e); });

// ═══════════════════════════════════════════════════════
// PAN & ZOOM
// ═══════════════════════════════════════════════════════
let tx = 40, ty = window.innerHeight / 2 - 30, sc = 0.85;
let isPanning = false, panSX = 0, panSY = 0, panTX = 0, panTY = 0;

function applyTransform() {
  viewport.setAttribute('transform', `translate(${tx},${ty}) scale(${sc})`);
}
applyTransform();

svgEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = svgEl.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.12 : 0.89;
  const newSc = Math.max(0.08, Math.min(5, sc * delta));
  tx = mx - (mx - tx) * (newSc / sc);
  ty = my - (my - ty) * (newSc / sc);
  sc = newSc;
  applyTransform();
}, {passive: false});

svgEl.addEventListener('mousedown', (e) => {
  if(e.target === svgEl || e.target === viewport ||
     e.target.id === 'links-layer' || e.target.id === 'nodes-layer') {
    isPanning = true;
    panSX = e.clientX; panSY = e.clientY;
    panTX = tx; panTY = ty;
    svgEl.style.cursor = 'grabbing';
    e.preventDefault();
  }
});
document.addEventListener('mousemove', (e) => {
  if(!isPanning) return;
  tx = panTX + (e.clientX - panSX);
  ty = panTY + (e.clientY - panSY);
  applyTransform();
});
document.addEventListener('mouseup', () => {
  isPanning = false;
  svgEl.style.cursor = 'default';
});

// Touch support
let touchStart = null;
svgEl.addEventListener('touchstart', (e) => {
  if(e.touches.length === 1) {
    touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty};
  }
});
svgEl.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if(e.touches.length === 1 && touchStart) {
    tx = touchStart.tx + (e.touches[0].clientX - touchStart.x);
    ty = touchStart.ty + (e.touches[0].clientY - touchStart.y);
    applyTransform();
  }
}, {passive: false});

// ═══════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════
document.getElementById('btn-expand').addEventListener('click', () => {
  const prev = Object.assign({}, currentLayout);
  allNodes.forEach(n => { if(n.children && n.children.length) n.expanded = true; });
  const next = getLayout();
  animate(prev, next, 600);
});

document.getElementById('btn-collapse').addEventListener('click', () => {
  const prev = Object.assign({}, currentLayout);
  allNodes.forEach(n => { if(n.depth > 0) n.expanded = false; });
  RAW.expanded = true;
  const next = getLayout();
  animate(prev, next, 480);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  tx = 40; ty = window.innerHeight/2 - 30; sc = 0.85;
  applyTransform();
});

// ═══════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════
const srchInput = document.getElementById('srch');
const srchClr = document.getElementById('srch-clr');

srchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  srchClr.style.display = q ? 'block' : 'none';
  if(!q) {
    nodesLayer.querySelectorAll('g').forEach(el => {
      el.setAttribute('opacity', '1');
      el.style.filter = '';
    });
    linksLayer.querySelectorAll('path').forEach(el => el.setAttribute('opacity', el._baseOpacity || '0.3'));
    return;
  }
  // Expand all
  const prev = Object.assign({}, currentLayout);
  allNodes.forEach(n => { if(n.children && n.children.length) n.expanded = true; });
  const next = getLayout();
  animate(prev, next, 400);

  setTimeout(() => {
    allNodes.forEach(node => {
      const match = node.n.toLowerCase().includes(q) || (node.a && node.a.toLowerCase().includes(q));
      const el = nodeEls[node.id];
      if(!el) return;
      if(match) {
        el.setAttribute('opacity', '1');
        const circ = el.querySelector('.n-circle');
        if(circ) circ.style.filter = `drop-shadow(0 0 8px ${node.color})`;
      } else {
        el.setAttribute('opacity', '0.06');
        const circ = el.querySelector('.n-circle');
        if(circ) circ.style.filter = '';
      }
    });
  }, 450);
});

srchClr.addEventListener('click', () => {
  srchInput.value = '';
  srchClr.style.display = 'none';
  nodesLayer.querySelectorAll('g').forEach(el => {
    el.setAttribute('opacity', '1');
    el.style.filter = '';
    el.querySelectorAll('circle').forEach(c => c.style.filter = '');
  });
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
createAllElements();
currentLayout = getLayout();
renderFrame(currentLayout);

window.addEventListener('resize', () => {
  ty = window.innerHeight / 2 - 30;
  applyTransform();
});
</script>
</body>
